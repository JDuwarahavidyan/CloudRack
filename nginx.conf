server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Support GitHub Pages base path when testing locally
  location /CloudRack/ {
    rewrite ^/CloudRack/(.*)$ /$1 break;
    try_files $uri /index.html;
  }

  location / {
    try_files $uri /index.html;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}
